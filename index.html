<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HijabKu - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="chatbot.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <img src="folder/logo.jpeg" alt="HijabKu Logo" class="logo-image">
                <h1>HijabKu</h1>
                <p>Platform Jual Beli Kerudung Online</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Masukkan email Anda" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password Anda" required>
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <button type="submit" class="btn-primary">Masuk</button>
                
                <div class="form-footer">
                    <a href="#" onclick="alert('Fitur lupa password akan dikirim ke email Anda')">Lupa Password?</a>
                    <a href="#" onclick="alert('Hubungi admin untuk registrasi')">Daftar Akun Baru</a>
                </div>
            </form>
            
            <div class="help-link">
                <a href="help.html" target="_blank">❓ Butuh Bantuan?</a>
            </div>
        </div>
    </div>
    
    <script src="login.js"></script>
    <script src="chatbot.js"></script>
</body>
</html>
