<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HijabKu - Daftar Akun</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .register-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .register-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        .register-box .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-box .logo .logo-image {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .register-box .logo h1 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .register-box .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .form-footer {
            margin-top: 20px;
            text-align: center;
        }

        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .terms {
            margin-top: 15px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 13px;
            color: #666;
        }

        .terms input[type="checkbox"] {
            width: auto;
            margin-top: 3px;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <div class="logo">
                <img src="folder/logo.jpeg" alt="HijabKu Logo" class="logo-image">
                <h1>Daftar Akun</h1>
                <p>Bergabung dengan HijabKu</p>
            </div>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Nama Depan *</label>
                        <input type="text" id="firstName" placeholder="Nama depan" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">Nama Belakang *</label>
                        <input type="text" id="lastName" placeholder="Nama belakang" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Nomor Telepon *</label>
                    <input type="tel" id="phone" placeholder="08xxxxxxxxxx" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" placeholder="Minimal 6 karakter" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Konfirmasi Password *</label>
                    <input type="password" id="confirmPassword" placeholder="Ulangi password" required>
                </div>
                
                <div class="form-group">
                    <label for="gender">Jenis Kelamin *</label>
                    <select id="gender" required>
                        <option value="">Pilih jenis kelamin</option>
                        <option value="female">Perempuan</option>
                        <option value="male">Laki-laki</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="address">Alamat Lengkap *</label>
                    <input type="text" id="address" placeholder="Jalan, No, RT/RW" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="city">Kota *</label>
                        <input type="text" id="city" placeholder="Kota" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="postalCode">Kode Pos *</label>
                        <input type="text" id="postalCode" placeholder="12345" required>
                    </div>
                </div>
                
                <div class="terms">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms">
                        Saya setuju dengan <a href="#" style="color: #667eea;">Syarat & Ketentuan</a> 
                        dan <a href="#" style="color: #667eea;">Kebijakan Privasi</a> HijabKu
                    </label>
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>
                
                <button type="submit" class="btn-register">Daftar Sekarang</button>
                
                <div class="form-footer">
                    Sudah punya akun? <a href="index.html">Masuk di sini</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="register.js"></script>
</body>
</html>
